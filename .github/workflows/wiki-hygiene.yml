name: Wiki Hygiene

on:
  push:
    branches: [ main, "issue/*", "phase/*" ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run Tests
        run: |
          PYTHONPATH=src pytest

      - name: Wiki Build
        run: |
          PYTHONPATH=src python3 -m wiki_compiler.main build

      - name: Wiki Audit
        # We might want to allow failure here if debt is high, 
        # but the requirement says exit non-zero on failure.
        # For now let's keep it strict to enforce hygiene.
        run: |
          PYTHONPATH=src python3 -m wiki_compiler.main audit

      - name: Artifact Validation
        run: |
          PYTHONPATH=src python3 -m wiki_compiler.main validate-wiki --all

      - name: Workflow Discipline
        run: |
          PYTHONPATH=src python3 -m wiki_compiler.main check-workflow
