<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>III-1 Resolver - Panel Draft</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --line: #d7dee8;
      --text: #243b53;
      --muted: #627d98;
      --accent: #2f6f42;
      --danger: #b42318;
      --warn: #b54708;
      --mono: "DM Mono", "Fira Mono", monospace;
      --sans: "DM Sans", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      background: linear-gradient(180deg, #eef3f7, #e6edf3);
      color: var(--text);
      padding: 24px;
    }

    .panel {
      width: 360px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    select {
      flex: 1;
      min-width: 0;
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
    }

    .body {
      max-height: 600px;
      overflow: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .kv {
      display: grid;
      grid-template-columns: 48% 52%;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-family: var(--mono);
    }

    .kv:last-child { border-bottom: 0; }
    .k { padding: 6px 8px; color: var(--muted); background: #f5f8fb; }
    .v { padding: 6px 8px; overflow-wrap: anywhere; }

    .badge {
      padding: 2px 6px;
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 10px;
      border: 1px solid var(--line);
    }

    .badge.error { color: var(--danger); border-color: #fecdca; background: #fffbfa; }
    .badge.warning { color: var(--warn); border-color: #fedf89; background: #fffcf5; }
  </style>
</head>
<body>
  <!-- Resolver-only draft. This panel is mounted next to the I-1 DB viewer in III-1. -->
  <aside class="panel" x-data="resolverPanelDraft()">
    <div class="header">
      <span class="label">Resolver</span>
      <select x-model="resolverItemId" @change="selectItem()">
        <template x-for="item in items" :key="item.ID_Item">
          <option :value="item.ID_Item" x-text="item.ID_Item + ' - ' + item.Nombre"></option>
        </template>
      </select>
    </div>

    <div class="body" x-show="resolvedItem">
      <section class="section">
        <div class="section-head">ITEM_CATALOGO</div>
        <template x-for="[k, v] in Object.entries(pickItemFields())" :key="k">
          <div class="kv"><div class="k" x-text="k"></div><div class="v" x-text="format(v)"></div></div>
        </template>
      </section>

      <section class="section">
        <div class="section-head">CATEGORIAS</div>
        <template x-for="[k, v] in Object.entries(resolvedItem.categoria || {})" :key="k">
          <div class="kv"><div class="k" x-text="k"></div><div class="v" x-text="format(v)"></div></div>
        </template>
      </section>

      <section class="section">
        <div class="section-head">PERFILES_PRECIO</div>
        <template x-for="[k, v] in Object.entries(resolvedItem.perfil || {})" :key="k">
          <div class="kv"><div class="k" x-text="k"></div><div class="v" x-text="format(v)"></div></div>
        </template>
      </section>

      <section class="section">
        <div class="section-head">REGLAS_NEGOCIO</div>
        <template x-for="regla in (resolvedItem.reglas || [])" :key="regla.ID_Regla">
          <div class="kv">
            <div class="k" x-text="regla.ID_Regla"></div>
            <div class="v">
              <span class="badge" :class="regla.Tipo_Accion === 'ERROR' ? 'error' : 'warning'" x-text="regla.Tipo_Accion"></span>
              <span x-text="' ' + regla.Nombre"></span>
            </div>
          </div>
        </template>
      </section>
    </div>
  </aside>

  <script>
    function resolverPanelDraft() {
      return {
        resolverItemId: null,
        resolvedItem: null,
        items: [],

        // In III-1 this data comes from the I-1 actor context:
        //   resolverItemId: string | null
        //   resolvedItem: object | null
        // and updates via:
        //   actor.send({ type: 'SELECT_RESOLVER_ITEM', itemId })

        selectItem() {
          // Replace this stub with actor.send({ type: 'SELECT_RESOLVER_ITEM', itemId: this.resolverItemId })
        },

        pickItemFields() {
          if (!this.resolvedItem) return {};
          const skip = new Set(['categoria', 'perfil', 'reglas']);
          return Object.fromEntries(Object.entries(this.resolvedItem).filter(([k]) => !skip.has(k)));
        },

        format(value) {
          if (value === null || value === undefined) return 'null';
          if (typeof value === 'object') return JSON.stringify(value);
          return String(value);
        }
      };
    }
  </script>
</body>
</html>
