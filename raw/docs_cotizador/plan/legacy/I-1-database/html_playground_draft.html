<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I-1 Database — Playground Draft</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

  <style>
    :root {
      --primary:      #2d5a27;
      --primary-mid:  #3d7a35;
      --primary-bg:   #edf5eb;
      --border:       #e2e8f0;
      --border-dark:  #cbd5e1;
      --bg:           #f8fafc;
      --bg-cell:      #ffffff;
      --bg-row-alt:   #f8fafc;
      --text:         #1e293b;
      --text-muted:   #64748b;
      --text-faint:   #94a3b8;
      --red:          #dc2626;
      --red-bg:       #fef2f2;
      --amber:        #b45309;
      --amber-bg:     #fffbeb;
      --mono:         'DM Mono', 'Fira Mono', monospace;
      --sans:         'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: #e8edf2;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Page layout ───────────────────────────────────────── */
    .dv-page {
      width: 100%;
      max-width: 1600px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    /* ── Viewer shell ──────────────────────────────────────── */
    .dv {
      flex: 1;
      min-width: 0;
      background: var(--bg-cell);
      border: 1px solid var(--border-dark);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.06);
    }

    /* ── Toolbar ───────────────────────────────────────────── */
    .dv-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-wrap: wrap;
    }

    .dv-tab {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border-dark);
      background: var(--bg-cell);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .dv-tab:hover { border-color: var(--primary-mid); color: var(--primary); }
    .dv-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .dv-toolbar-spacer { flex: 1; }

    .dv-search {
      font-family: var(--sans);
      font-size: 0.82rem;
      padding: 5px 10px;
      border: 1px solid var(--border-dark);
      border-radius: 6px;
      background: var(--bg-cell);
      color: var(--text);
      outline: none;
      width: 180px;
      transition: border-color 0.15s;
    }
    .dv-search:focus { border-color: var(--primary-mid); }
    .dv-search::placeholder { color: var(--text-faint); }

    /* ── Main split ────────────────────────────────────────── */
    .dv-body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Table panel (left) ────────────────────────────────── */
    .dv-table-panel {
      flex: 1;
      overflow: auto;
      min-height: 420px;
      max-height: 560px;
    }

    .dv-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.79rem;
    }

    .dv-table thead th {
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      background: var(--bg);
      padding: 7px 12px;
      border-bottom: 2px solid var(--border-dark);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .dv-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.08s;
    }
    .dv-table tbody tr:nth-child(even) { background: var(--bg-row-alt); }
    .dv-table tbody tr:hover { background: var(--primary-bg); }

    .dv-table tbody td {
      font-family: var(--mono);
      font-size: 0.76rem;
      padding: 6px 12px;
      color: var(--text);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dv-table tbody td.cell-pk {
      color: var(--primary);
      font-weight: 500;
    }
    .dv-table tbody td.cell-null { color: var(--text-faint); font-style: italic; }
    .dv-table tbody td.cell-bool-t { color: var(--primary); }
    .dv-table tbody td.cell-bool-f { color: var(--text-faint); }
    .dv-table tbody td.cell-json {
      color: var(--text-muted);
      font-size: 0.7rem;
    }

    .dv-empty {
      padding: 32px;
      text-align: center;
      color: var(--text-faint);
      font-size: 0.85rem;
    }

    /* ── Row count pill ────────────────────────────────────── */
    .dv-row-count {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 2px 7px;
      background: var(--primary-bg);
      color: var(--primary);
      border-radius: 10px;
      border: 1px solid #c6e0c2;
    }

    /* ── Sortable headers ──────────────────────────────────── */
    .dv-table thead th {
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, color 0.1s;
    }
    .dv-table thead th:hover { background: var(--primary-bg); }
    .dv-table thead th.col-sorted {
      background: var(--primary-bg);
      color: var(--primary);
    }
    .dv-th-inner {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .dv-sort-icon {
      font-size: 0.58rem;
      color: var(--text-faint);
      flex-shrink: 0;
      transition: color 0.1s;
    }
    .dv-sort-icon.sorted { color: var(--primary); }

    /* ── Tag filter bar ────────────────────────────────────── */
    .dv-tagbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-wrap: wrap;
    }
    .dv-tagbar-label {
      font-family: var(--mono);
      font-size: 0.64rem;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      margin-right: 2px;
    }
    .dv-tag-chip {
      font-family: var(--mono);
      font-size: 0.67rem;
      padding: 2px 9px;
      border-radius: 10px;
      border: 1px solid var(--border-dark);
      background: var(--bg-cell);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
      line-height: 1.6;
    }
    .dv-tag-chip:hover { border-color: var(--primary-mid); color: var(--primary); }
    .dv-tag-chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .dv-tag-chip.clear {
      color: var(--red);
      border-color: #fca5a5;
    }
    .dv-tag-chip.clear:hover { background: var(--red-bg); }

    /* ── Inline edit ───────────────────────────────────────── */
    .dv-table tbody td { cursor: default; }
    .dv-table tbody td.cell-editing {
      padding: 0 !important;
      background: #fffbeb !important;
      outline: 2px solid var(--amber);
      outline-offset: -2px;
      overflow: visible;
    }
    .cell-edit-input {
      font-family: var(--mono);
      font-size: 0.76rem;
      width: 100%;
      padding: 6px 12px;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      display: block;
    }

  </style>
</head>
<body>

  <div x-data="dbViewer()" class="dv-page">

    <!-- ── DB Viewer card ──────────────────────────────── -->
    <div class="dv">

      <!-- Toolbar -->
      <div class="dv-toolbar">
        <template x-for="t in tableNames" :key="t">
          <button class="dv-tab" :class="{ active: activeTable === t }"
                  @click="activeTable = t; search = ''; sortKey = ''; sortDir = 'asc'; tagFilters = []"
                  x-text="t"></button>
        </template>

        <span class="dv-toolbar-spacer"></span>

        <span class="dv-row-count" x-text="filteredRows.length + ' / ' + currentRows.length + ' filas'"></span>
        <input class="dv-search" type="text" x-model="search" placeholder="Filtrar…"
               :disabled="currentRows.length === 0" />
      </div>

      <!-- Tag filter bar -->
      <div class="dv-tagbar" x-show="availableTags.length > 0">
        <span class="dv-tagbar-label">filtrar:</span>
        <template x-for="tag in availableTags" :key="tag">
          <button class="dv-tag-chip" :class="{ active: tagFilters.includes(tag) }"
                  @click="toggleTag(tag)" x-text="tag"></button>
        </template>
        <button x-show="tagFilters.length > 0" class="dv-tag-chip clear"
                @click="tagFilters = []">✕ limpiar</button>
      </div>

      <!-- Table panel (full width) -->
      <div class="dv-body">
        <div class="dv-table-panel">
          <template x-if="filteredRows.length === 0">
            <div class="dv-empty">
              <i class="fa-solid fa-table-cells" style="font-size:1.4rem; margin-bottom:8px; display:block;"></i>
              Sin resultados
            </div>
          </template>

          <template x-if="filteredRows.length > 0">
            <table class="dv-table">
              <thead>
                <tr>
                  <template x-for="col in currentColumns" :key="col">
                    <th :class="{ 'col-sorted': sortKey === col }" @click="sortBy(col)">
                      <div class="dv-th-inner">
                        <span x-text="col"></span>
                        <i class="fa-solid dv-sort-icon"
                           :class="{
                             'fa-sort':      sortKey !== col,
                             'fa-sort-up':   sortKey === col && sortDir === 'asc',
                             'fa-sort-down': sortKey === col && sortDir === 'desc',
                             'sorted':       sortKey === col
                           }"></i>
                      </div>
                    </th>
                  </template>
                </tr>
              </thead>
              <tbody>
                <template x-for="(row, ri) in filteredRows" :key="ri">
                  <tr>
                    <template x-for="col in currentColumns" :key="col">
                      <td :class="isEditing(row, col) ? 'cell-editing' : cellClass(col, row[col])"
                          :title="isEditing(row, col) ? '' : displayValue(row[col])"
                          @dblclick="startEdit(row, col)">
                        <template x-if="!isEditing(row, col)">
                          <span x-text="truncateCell(row[col])"></span>
                        </template>
                        <template x-if="isEditing(row, col)">
                          <input class="cell-edit-input"
                                 x-model="editingValue"
                                 x-init="$el.focus(); $el.select()"
                                 @keydown.enter="commitEdit()"
                                 @keydown.escape="cancelEdit()"
                                 @blur="commitEdit()" />
                        </template>
                      </td>
                    </template>
                  </tr>
                </template>
              </tbody>
            </table>
          </template>
        </div>
      </div>

    </div><!-- /.dv -->

  </div><!-- /.dv-page -->

  <script>
    // ─────────────────────────────────────────────────────────
    // Seed data  (mirrors packages/database/src/seed.js)
    // ─────────────────────────────────────────────────────────
    const SEED_PERFILES_PRECIO = [
      { ID_Perfil_Precio: 'PP-001', Nombre: 'Solo por Pax',    Costo_Base_Fijo: 0,      Costo_Unitario_Pax: 4600, Costo_Unitario_Tiempo: 0,    Costo_Unitario_Item: 0,    Activo: true },
      { ID_Perfil_Precio: 'PP-002', Nombre: 'Base Fija',       Costo_Base_Fijo: 120000, Costo_Unitario_Pax: 0,    Costo_Unitario_Tiempo: 0,    Costo_Unitario_Item: 0,    Activo: true },
      { ID_Perfil_Precio: 'PP-003', Nombre: 'Base + Pax',      Costo_Base_Fijo: 50000,  Costo_Unitario_Pax: 2500, Costo_Unitario_Tiempo: 0,    Costo_Unitario_Item: 0,    Activo: true },
      { ID_Perfil_Precio: 'PP-004', Nombre: 'Por Hora + Pax',  Costo_Base_Fijo: 0,      Costo_Unitario_Pax: 1800, Costo_Unitario_Tiempo: 8500, Costo_Unitario_Item: 0,    Activo: true },
      { ID_Perfil_Precio: 'PP-005', Nombre: 'Por Unidad',      Costo_Base_Fijo: 0,      Costo_Unitario_Pax: 0,    Costo_Unitario_Tiempo: 0,    Costo_Unitario_Item: 3200, Activo: true },
    ];

    const SEED_CATEGORIAS = [
      { ID_Categoria: 'CAT-001', Nombre: 'Coffee Break',    ID_Perfil_Precio_Default: 'PP-001', Def_Requiere_Pax: true,  Def_Requiere_Cant: false, Def_Requiere_Tiempo: false, Def_Requiere_Hora: true,  Def_Duracion_Min: 30,   Def_Unidades_Por_Pax: 1,    Icono_UI: 'coffee',   Activo: true },
      { ID_Categoria: 'CAT-002', Nombre: 'Almuerzo / Cena', ID_Perfil_Precio_Default: 'PP-001', Def_Requiere_Pax: true,  Def_Requiere_Cant: false, Def_Requiere_Tiempo: false, Def_Requiere_Hora: true,  Def_Duracion_Min: 90,   Def_Unidades_Por_Pax: 1,    Icono_UI: 'utensils', Activo: true },
      { ID_Categoria: 'CAT-003', Nombre: 'Open Bar',        ID_Perfil_Precio_Default: 'PP-004', Def_Requiere_Pax: true,  Def_Requiere_Cant: false, Def_Requiere_Tiempo: true,  Def_Requiere_Hora: true,  Def_Duracion_Min: 120,  Def_Unidades_Por_Pax: 1,    Icono_UI: 'wine',     Activo: true },
      { ID_Categoria: 'CAT-004', Nombre: 'Salón / Espacio', ID_Perfil_Precio_Default: 'PP-002', Def_Requiere_Pax: false, Def_Requiere_Cant: false, Def_Requiere_Tiempo: false, Def_Requiere_Hora: false, Def_Duracion_Min: null, Def_Unidades_Por_Pax: null, Icono_UI: 'building', Activo: true },
      { ID_Categoria: 'CAT-005', Nombre: 'Equipamiento',    ID_Perfil_Precio_Default: 'PP-005', Def_Requiere_Pax: false, Def_Requiere_Cant: true,  Def_Requiere_Tiempo: false, Def_Requiere_Hora: false, Def_Duracion_Min: null, Def_Unidades_Por_Pax: null, Icono_UI: 'monitor',  Activo: true },
    ];

    const SEED_ITEM_CATALOGO = [
      { ID_Item: 'ITEM-001', Nombre: 'Coffee Break Estándar', ID_Categoria: 'CAT-001', ID_Perfil_Precio_Override: null,    Def_Unidades_Por_Pax_Override: null, Default_Glosa: 'Coffee break con bebestibles calientes y snacks',          Activo: true },
      { ID_Item: 'ITEM-002', Nombre: 'Coffee Break Premium',  ID_Categoria: 'CAT-001', ID_Perfil_Precio_Override: 'PP-003', Def_Unidades_Por_Pax_Override: null, Default_Glosa: 'Coffee break premium con pastelería artesanal',              Activo: true },
      { ID_Item: 'ITEM-003', Nombre: 'Almuerzo Ejecutivo',    ID_Categoria: 'CAT-002', ID_Perfil_Precio_Override: null,    Def_Unidades_Por_Pax_Override: null, Default_Glosa: 'Almuerzo de 3 tiempos con entrada, fondo y postre',         Activo: true },
      { ID_Item: 'ITEM-004', Nombre: 'Cena de Gala',          ID_Categoria: 'CAT-002', ID_Perfil_Precio_Override: 'PP-003', Def_Unidades_Por_Pax_Override: null, Default_Glosa: 'Cena formal con menú de 5 tiempos',                         Activo: true },
      { ID_Item: 'ITEM-005', Nombre: 'Brunch Campestre',      ID_Categoria: 'CAT-002', ID_Perfil_Precio_Override: null,    Def_Unidades_Por_Pax_Override: null, Default_Glosa: 'Brunch con estaciones de comida',                            Activo: true },
      { ID_Item: 'ITEM-006', Nombre: 'Open Bar Clásico',      ID_Categoria: 'CAT-003', ID_Perfil_Precio_Override: null,    Def_Unidades_Por_Pax_Override: null, Default_Glosa: 'Bar abierto con variedad estándar',                          Activo: true },
      { ID_Item: 'ITEM-007', Nombre: 'Open Bar Premium',      ID_Categoria: 'CAT-003', ID_Perfil_Precio_Override: 'PP-004', Def_Unidades_Por_Pax_Override: null, Default_Glosa: 'Bar premium con importados y cocteles especiales',           Activo: true },
      { ID_Item: 'ITEM-008', Nombre: 'Salón Principal',       ID_Categoria: 'CAT-004', ID_Perfil_Precio_Override: null,    Def_Unidades_Por_Pax_Override: null, Default_Glosa: 'Salón principal con capacidad para 200 personas',             Activo: true },
      { ID_Item: 'ITEM-009', Nombre: 'Terraza Exterior',      ID_Categoria: 'CAT-004', ID_Perfil_Precio_Override: 'PP-002', Def_Unidades_Por_Pax_Override: null, Default_Glosa: 'Terraza al aire libre con vista panorámica',                 Activo: true },
      { ID_Item: 'ITEM-010', Nombre: 'Proyector + Pantalla',  ID_Categoria: 'CAT-005', ID_Perfil_Precio_Override: null,    Def_Unidades_Por_Pax_Override: null, Default_Glosa: 'Proyector Full HD con pantalla de 3m',                       Activo: true },
      { ID_Item: 'ITEM-011', Nombre: 'Sistema de Sonido',     ID_Categoria: 'CAT-005', ID_Perfil_Precio_Override: null,    Def_Unidades_Por_Pax_Override: null, Default_Glosa: 'Sistema de sonido profesional con 2 micrófonos',              Activo: true },
    ];

    // NOTE: R-002 uses horaMin (event minutes) — NOT hora string comparison.
    // horaMin for 18:00 = 1080, for 02:00 (next-day) = 1500.
    // Warning fires when item is scheduled OUTSIDE the valid 18:00–02:00 window.
    const SEED_REGLAS_NEGOCIO = [
      {
        ID_Regla: 'R-001', Nombre: 'Máximo 300 pax por evento',
        Etapa: 'RESTRICCION_UI', Scope: 'ITEM', Tipo_Accion: 'ERROR', Hook: null,
        Condicion_JSON: { '>': [{ var: 'pax' }, 300] },
        Payload_JSON:   { message: 'Este ítem soporta máximo 300 pax.' },
        Prioridad: 10, Acumulable: false, Activo: true,
      },
      {
        ID_Regla: 'R-002', Nombre: 'Open Bar: solo en horario 18:00–02:00',
        Etapa: 'RESTRICCION_UI', Scope: 'ITEM', Tipo_Accion: 'WARNING', Hook: null,
        Condicion_JSON: { or: [{ '<': [{ var: 'horaMin' }, 1080] }, { '>': [{ var: 'horaMin' }, 1500] }] },
        Payload_JSON:   { message: 'El Open Bar está disponible a partir de las 18:00 (hasta las 02:00).' },
        Prioridad: 20, Acumulable: false, Activo: true,
      },
    ];

    // ─────────────────────────────────────────────────────────
    // Tag columns — which field drives the tag filter per table
    // ─────────────────────────────────────────────────────────
    const TAG_COLUMNS = {
      ITEM_CATALOGO:  'ID_Categoria',
      REGLAS_NEGOCIO: 'Tipo_Accion',
      CATEGORIAS:     null,
      PERFILES_PRECIO: null,
    };

    // ─────────────────────────────────────────────────────────
    // Alpine component
    // ─────────────────────────────────────────────────────────
    document.addEventListener('alpine:init', () => {
      Alpine.data('dbViewer', () => ({

        tables: {
          PERFILES_PRECIO:  SEED_PERFILES_PRECIO,
          CATEGORIAS:       SEED_CATEGORIAS,
          ITEM_CATALOGO:    SEED_ITEM_CATALOGO,
          REGLAS_NEGOCIO:   SEED_REGLAS_NEGOCIO,
        },

        tableNames: ['PERFILES_PRECIO', 'CATEGORIAS', 'ITEM_CATALOGO', 'REGLAS_NEGOCIO'],
        activeTable: 'ITEM_CATALOGO',
        search: '',

        // Sort
        sortKey: '',
        sortDir: 'asc',

        // Tag filter
        tagFilters: [],

        // Inline edit
        editingCell: null,
        editingValue: '',

        // ── Table helpers ─────────────────────────────────
        get currentRows() {
          return this.tables[this.activeTable] ?? [];
        },
        get currentColumns() {
          return this.currentRows.length > 0 ? Object.keys(this.currentRows[0]) : [];
        },
        get filteredRows() {
          let rows = this.currentRows;
          if (this.search.trim()) {
            const q = this.search.toLowerCase();
            rows = rows.filter(row =>
              Object.values(row).some(v => String(v ?? '').toLowerCase().includes(q))
            );
          }
          if (this.tagFilters.length > 0) {
            const col = TAG_COLUMNS[this.activeTable];
            if (col) rows = rows.filter(row => this.tagFilters.includes(String(row[col] ?? '')));
          }
          if (this.sortKey) {
            rows = [...rows].sort((a, b) => {
              const vA = typeof a[this.sortKey] === 'string' ? a[this.sortKey].toUpperCase() : (a[this.sortKey] ?? '');
              const vB = typeof b[this.sortKey] === 'string' ? b[this.sortKey].toUpperCase() : (b[this.sortKey] ?? '');
              if (vA > vB) return this.sortDir === 'asc' ? 1 : -1;
              if (vA < vB) return this.sortDir === 'asc' ? -1 : 1;
              return 0;
            });
          }
          return rows;
        },
        get availableTags() {
          const col = TAG_COLUMNS[this.activeTable];
          if (!col) return [];
          return [...new Set(this.currentRows.map(r => String(r[col] ?? '')))].filter(Boolean).sort();
        },

        // ── Sort ──────────────────────────────────────────
        sortBy(col) {
          if (this.sortKey === col) {
            this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
          } else {
            this.sortKey = col;
            this.sortDir = 'asc';
          }
        },

        // ── Tag filter ────────────────────────────────────
        toggleTag(tag) {
          const i = this.tagFilters.indexOf(tag);
          if (i >= 0) this.tagFilters.splice(i, 1);
          else this.tagFilters.push(tag);
        },

        // ── Inline edit ───────────────────────────────────
        startEdit(row, col) {
          this.editingCell = { row, col };
          this.editingValue = String(row[col] ?? '');
        },
        commitEdit() {
          if (!this.editingCell) return;
          this.editingCell.row[this.editingCell.col] = this.editingValue;
          this.editingCell = null;
        },
        cancelEdit() {
          this.editingCell = null;
        },
        isEditing(row, col) {
          return this.editingCell?.row === row && this.editingCell?.col === col;
        },

        // ── Display helpers ───────────────────────────────
        displayValue(v) {
          if (v === null || v === undefined) return 'null';
          if (typeof v === 'boolean') return v ? 'true' : 'false';
          if (typeof v === 'object') return JSON.stringify(v);
          return String(v);
        },
        truncateCell(v) {
          const s = this.displayValue(v);
          return s.length > 40 ? s.slice(0, 40) + '…' : s;
        },

        cellClass(col, v) {
          if (col.startsWith('ID_') && !col.includes('Default') && !col.includes('Override')) return 'cell-pk';
          if (v === null || v === undefined) return 'cell-null';
          if (v === true) return 'cell-bool-t';
          if (v === false) return 'cell-bool-f';
          if (typeof v === 'object') return 'cell-json';
          return '';
        }

      }));
    });
  </script>
</body>
</html>
